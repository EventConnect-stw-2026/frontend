<!-- 
  Contenedor principal del layout de administración.
  Organiza el sidebar lateral y el contenido principal.
-->
<div class="admin-layout">

  <!-- 
    Componente del menú lateral de administración.
    Incluye las distintas opciones de navegación del panel.
  -->
  <app-admin-sidebar></app-admin-sidebar>

  <!-- 
    Contenedor principal del contenido dinámico.
    Aquí se renderizan las distintas vistas administrativas
    mediante el sistema de rutas de Angular.
  -->
  <main class="admin-content">

    <!-- Punto de carga de las rutas hijas -->
    <router-outlet></router-outlet>
  </main>
</div>
