<!-- 
  Aplicación: EventConnect - Plataforma de gestión de eventos
  Archivo: forgot-password.component.html
  Descripción: Plantilla HTML para solicitar la recuperación de contraseña.
  Autor: Pablo Báscones, Mario Caudevilla, Mario Hernández y David Borrel
-->

<!-- Contenedor principal de la página de autenticación -->
<div class="auth-page">

  <!-- Tarjeta central del formulario de recuperación -->
  <div class="auth-card">

    <!-- Cabecera de la tarjeta con logo, título y explicación -->
    <div class="card-header">

      <!-- Contenedor visual del logotipo -->
      <div class="logo-wrapper">
        <div class="logo-card">

          <!-- Logo de la aplicación -->
          <img src="assets/images/logo.png" class="logo" alt="EventConnect">
        </div>
      </div>

      <!-- Título principal de la pantalla -->
      <h2>Recuperar contraseña</h2>

      <!-- Texto explicativo del proceso de recuperación -->
      <p>Introduce tu correo y te enviaremos un enlace para restablecerla.</p>
    </div>

    <!-- Formulario reactivo para enviar el correo de recuperación -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Campo de correo electrónico -->
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input 
          id="email" 
          type="email" 
          formControlName="email"
          placeholder="tu@correo.com"
        />

        <!-- Mensaje de validación del campo email -->
        <small class="error-text" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Por favor introduce un correo válido
        </small>
      </div>

      <!-- Botón de envío del formulario -->
      <button 
        type="submit" 
        [disabled]="isSubmitting"
      >
        {{ isSubmitting ? 'Enviando...' : 'Enviar enlace' }}
      </button>
    </form>

    <!-- Enlace para volver a la pantalla de inicio de sesión -->
    <p class="back-link">
      <a routerLink="/login">Volver al login</a>
    </p>
  </div>

  <!-- Modal de éxito mostrado cuando el correo se envía correctamente -->
  <div class="modal-overlay" *ngIf="message" (click)="closeModal()">

    <!-- Contenido del modal de éxito -->
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✓</span>
      <h3 class="modal-title">¡Enlace enviado!</h3>
      <p class="modal-message">{{ message }}</p>

      <!-- Botón para volver al login tras enviar el enlace -->
      <button class="modal-button success" (click)="goToLogin()">Volver al login</button>
    </div>
  </div>

  <!-- Modal de error mostrado cuando falla el proceso -->
  <div class="modal-overlay" *ngIf="errorMessage" (click)="closeModal()">

    <!-- Contenido del modal de error -->
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✕</span>
      <h3 class="modal-title">¡Oops!</h3>
      <p class="modal-message">{{ errorMessage }}</p>

      <!-- Botón para cerrar el modal e intentar de nuevo -->
      <button class="modal-button error" (click)="closeModal()">Intentar de nuevo</button>
    </div>
  </div>
</div>
