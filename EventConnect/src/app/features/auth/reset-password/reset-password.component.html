<!-- 
  Aplicación: EventConnect - Plataforma de gestión de eventos
  Archivo: reset-password.component.html
  Descripción: Plantilla HTML para restablecer la contraseña de usuario.
  Autor: Pablo Báscones, Mario Caudevilla, Mario Hernández y David Borrel
-->

<!-- Contenedor principal de la pantalla de autenticación -->
<div class="auth-page">

  <!-- Tarjeta central del formulario de restablecimiento -->
  <div class="auth-card">

    <!-- Cabecera de la tarjeta con logo, título y descripción -->
    <div class="card-header">
      <div class="logo-wrapper">
        <div class="logo-card">

          <!-- Logo de EventConnect -->
          <img src="assets/images/logo.png" class="logo" alt="EventConnect">
        </div>
      </div>

      <!-- Título principal de la pantalla -->
      <h2>Restablecer contraseña</h2>

      <!-- Texto explicativo del proceso -->
      <p>Crea una nueva contraseña para tu cuenta</p>
    </div>

    <!-- Formulario reactivo de cambio de contraseña -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <!-- Campo de nueva contraseña -->
      <div class="form-group">
        <label for="password">Nueva contraseña</label>

        <!-- Contenedor del input y botón de visibilidad -->
        <div class="input-wrapper">
          <input 
            id="password" 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
          />

          <!-- Botón para mostrar u ocultar la nueva contraseña -->
          <button type="button" class="toggle-eye" (click)="showPassword = !showPassword">

            <!-- Icono mostrado cuando la contraseña es visible -->
            @if (showPassword) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {

              <!-- Icono mostrado cuando la contraseña está oculta -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>

        <!-- Mensaje de validación de la nueva contraseña -->
        <small class="error-text" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          La contraseña debe tener al menos 6 caracteres
        </small>
      </div>

      <!-- Campo de confirmación de contraseña -->
      <div class="form-group">
        <label for="confirmPassword">Repetir contraseña</label>

        <!-- Contenedor del input y botón de visibilidad -->
        <div class="input-wrapper">
          <input 
            id="confirmPassword" 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            formControlName="confirmPassword"
            placeholder="Repite tu contraseña"
          />

          <!-- Botón para mostrar u ocultar la confirmación de contraseña -->
          <button type="button" class="toggle-eye" (click)="showConfirmPassword = !showConfirmPassword">

            <!-- Icono mostrado cuando la confirmación es visible -->
            @if (showConfirmPassword) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {

              <!-- Icono mostrado cuando la confirmación está oculta -->
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>

        <!-- Mensaje de validación de confirmación de contraseña -->
        <small class="error-text" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.invalid">
          Las contraseñas no coinciden
        </small>
      </div>

      <!-- Botón principal para guardar la nueva contraseña -->
      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Guardando...' : 'Guardar nueva contraseña' }}
      </button>
    </form>

    <!-- Enlace para volver al login -->
    <p class="back-link">
      <a routerLink="/login">Volver al login</a>
    </p>
  </div>

  <!-- Modal de éxito mostrado cuando la contraseña se actualiza correctamente -->
  <div class="modal-overlay" *ngIf="message" (click)="closeModal()">

    <!-- Contenido del modal de éxito -->
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✓</span>
      <h3 class="modal-title">¡Contraseña actualizada!</h3>
      <p class="modal-message">{{ message }}</p>

      <!-- Botón para volver al login tras restablecer contraseña -->
      <button class="modal-button success" (click)="goToLogin()">Ir al login</button>
    </div>
  </div>

  <!-- Modal de error mostrado cuando falla el restablecimiento -->
  <div class="modal-overlay" *ngIf="errorMessage" (click)="closeModal()">

    <!-- Contenido del modal de error -->
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✕</span>
      <h3 class="modal-title">¡Oops!</h3>
      <p class="modal-message">{{ errorMessage }}</p>

      <!-- Botón para cerrar el modal e intentar de nuevo -->
      <button class="modal-button error" (click)="closeModal()">Intentar de nuevo</button>
    </div>
  </div>
</div>
