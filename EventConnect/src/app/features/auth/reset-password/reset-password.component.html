<div class="auth-page">
  <div class="auth-card">
    <div class="card-header">
      <div class="logo-wrapper">
        <div class="logo-card">
          <img src="assets/images/logo.png" class="logo" alt="EventConnect">
        </div>
      </div>
      <h2>Restablecer contraseña</h2>
      <p>Crea una nueva contraseña para tu cuenta</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="password">Nueva contraseña</label>
        <div class="input-wrapper">
          <input 
            id="password" 
            [type]="showPassword ? 'text' : 'password'" 
            formControlName="password"
            placeholder="Mínimo 6 caracteres"
          />
          <button type="button" class="toggle-eye" (click)="showPassword = !showPassword">
            @if (showPassword) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        <small class="error-text" *ngIf="form.get('password')?.touched && form.get('password')?.invalid">
          La contraseña debe tener al menos 6 caracteres
        </small>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Repetir contraseña</label>
        <div class="input-wrapper">
          <input 
            id="confirmPassword" 
            [type]="showConfirmPassword ? 'text' : 'password'" 
            formControlName="confirmPassword"
            placeholder="Repite tu contraseña"
          />
          <button type="button" class="toggle-eye" (click)="showConfirmPassword = !showConfirmPassword">
            @if (showConfirmPassword) {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        <small class="error-text" *ngIf="form.get('confirmPassword')?.touched && form.get('confirmPassword')?.invalid">
          Las contraseñas no coinciden
        </small>
      </div>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Guardando...' : 'Guardar nueva contraseña' }}
      </button>
    </form>

    <p class="back-link">
      <a routerLink="/login">Volver al login</a>
    </p>
  </div>

  <!-- Modal pop-up éxito -->
  <div class="modal-overlay" *ngIf="message" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✓</span>
      <h3 class="modal-title">¡Contraseña actualizada!</h3>
      <p class="modal-message">{{ message }}</p>
      <button class="modal-button success" (click)="goToLogin()">Ir al login</button>
    </div>
  </div>

  <!-- Modal pop-up error -->
  <div class="modal-overlay" *ngIf="errorMessage" (click)="closeModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <span class="modal-icon">✕</span>
      <h3 class="modal-title">¡Oops!</h3>
      <p class="modal-message">{{ errorMessage }}</p>
      <button class="modal-button error" (click)="closeModal()">Intentar de nuevo</button>
    </div>
  </div>
</div>
